<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Імпорт товарів DreamShop</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        .subtitle { color: #7f8c8d; margin-bottom: 30px; font-size: 14px; }
        .button {
            background: linear-gradient(135deg, #4dd0e1 0%, #26c6da 50%, #00acc1 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin: 10px 10px 10px 0;
            transition: transform 0.2s;
        }
        .button:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
        .button.danger { background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 50%, #c44569 100%); }
        #log {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            height: 300px;
            overflow-y: auto;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .log-entry { padding: 5px 0; border-bottom: 1px solid #e9ecef; }
        .log-entry.success { color: #27ae60; }
        .log-entry.error { color: #e74c3c; }
        .log-entry.info { color: #3498db; }
        .log-entry.warning { color: #f39c12; }
        .stats {
            background: #ecf0f1;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .stat { background: white; padding: 15px; border-radius: 6px; text-align: center; }
        .stat-value { font-size: 28px; font-weight: 700; color: #2c3e50; }
        .stat-label { color: #7f8c8d; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 Імпорт товарів DreamShop</h1>
        <p class="subtitle">Завантажте базові товари з JSON файлів прямо у Firestore</p>

        <div>
            <button class="button" onclick="importBasicProducts()">📥 Імпортувати товари</button>
            <button class="button" onclick="checkProducts()">🔍 Перевірити товари в базі</button>
            <button class="button danger" onclick="clearAllProducts()">🗑️ Видалити ВСІ товари</button>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">Усього товарів</div>
            </div>
        </div>

        <div id="log"></div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import {
            getFirestore,
            collection,
            getDocs,
            addDoc,
            query,
            where,
            writeBatch
        } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBPZW-u_JwGg3j6qY3-Pib_YfhFq5WlHf4",
            authDomain: "dreamshop-odessa.firebaseapp.com",
            projectId: "dreamshop-odessa",
            storageBucket: "dreamshop-odessa.appspot.com",
            messagingSenderId: "1094584929865",
            appId: "1:1094584929865:web:78236e88098f5aae12c905"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(`[${type.toUpperCase()}] ${message}`);
        }

        window.checkProducts = async function() {
            log('🔍 Перевіряю товари в базі...', 'info');
            try {
                const snapshot = await getDocs(collection(db, 'products'));
                log(`✅ Усього товарів: ${snapshot.size}`, 'success');
                document.getElementById('totalCount').textContent = snapshot.size;
                if (snapshot.size > 0) {
                    const items = [];
                    snapshot.forEach(doc => items.push(doc.data()));
                    log('📝 Перші товари:', 'info');
                    items.slice(0, 3).forEach(p => {
                        log(`  - ${p.name} (категорія: ${p.category})`, 'info');
                    });
                }
            } catch (error) {
                log(`❌ Помилка: ${error.message}`, 'error');
            }
        };

        window.importBasicProducts = async function() {
            log('📥 Завантажуємо товари...', 'info');
            try {
                const response = await fetch('/data/basic-products.json');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const products = await response.json();
                log(`✅ Завантажено з файлу: ${products.length} товарів`, 'success');

                let imported = 0;
                let skipped = 0;

                for (const product of products) {
                    try {
                        const existingQuery = query(
                            collection(db, 'products'),
                            where('name', '==', product.name)
                        );
                        const existingSnapshot = await getDocs(existingQuery);
                        if (existingSnapshot.empty) {
                            await addDoc(collection(db, 'products'), {
                                ...product,
                                createdAt: new Date(),
                                updatedAt: new Date()
                            });
                            imported++;
                            log(`✅ Додано: ${product.name}`, 'success');
                        } else {
                            skipped++;
                            log(`⏭️ Вже існує: ${product.name}`, 'warning');
                        }
                    } catch (error) {
                        log(`❌ Помилка при додаванні ${product.name}: ${error.message}`, 'error');
                    }
                }

                log(`✨ Імпорт завершено! Додано: ${imported}, Пропущено: ${skipped}`, 'success');
                setTimeout(() => window.checkProducts(), 1000);
            } catch (error) {
                log(`❌ Помилка завантаження файлу: ${error.message}`, 'error');
            }
        };

        window.clearAllProducts = async function() {
            if (!confirm('Ви впевнені, що хочете ВИДАЛИТИ ВСІ товари? Це дійство не можна скасувати!')) return;
            log('🗑️ Видаляю ВСІ товари...', 'warning');
            try {
                const snapshot = await getDocs(collection(db, 'products'));
                log(`Знайдено ${snapshot.size} товарів для видалення...`, 'info');
                const batch = writeBatch(db);
                snapshot.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                log(`✅ Видалено ${snapshot.size} товарів!`, 'success');
                setTimeout(() => window.checkProducts(), 1000);
            } catch (error) {
                log(`❌ Помилка при видаленні: ${error.message}`, 'error');
            }
        };

        window.checkProducts();
    </script>
</body>
</html>
